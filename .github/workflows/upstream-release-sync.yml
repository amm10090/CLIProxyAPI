name: sync-upstream-release

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  PROJECT_ID: gen-lang-client-0984777924
  REGION: us-central1
  SERVICE: cliproxy

jobs:
  sync_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: code-584@gen-lang-client-0984777924.iam.gserviceaccount.com

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Sync upstream release and deploy when needed
        env:
          GH_TOKEN: ${{ github.token }}
          SYNC_PAT: ${{ secrets.SYNC_PAT }}
        run: bash .github/scripts/sync-upstream-release.sh
