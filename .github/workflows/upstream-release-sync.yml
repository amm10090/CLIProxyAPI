name: sync-upstream-release

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  PROJECT_ID: gen-lang-client-0984777924
  REGION: us-central1
  SERVICE: cliproxy

jobs:
  sync_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          path: fork

      - name: Detect whether SYNC_PAT is configured
        id: pat
        env:
          SYNC_PAT: ${{ secrets.SYNC_PAT }}
        run: |
          if [ -n "${SYNC_PAT}" ]; then
            echo "has_sync_pat=true" >> "${GITHUB_OUTPUT}"
          else
            echo "has_sync_pat=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Fetch upstream and origin tags
        working-directory: fork
        run: |
          git remote add upstream https://github.com/router-for-me/CLIProxyAPI.git || true
          git fetch upstream --tags --prune
          git fetch origin --tags --prune

      - name: Detect latest upstream release
        id: detect
        working-directory: fork
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          state_file=".github/upstream-release-state.json"
          latest_tag="$(
            curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/router-for-me/CLIProxyAPI/releases/latest \
              | python3 -c "import json,sys; print(json.load(sys.stdin).get('tag_name',''))"
          )"

          if [ -z "${latest_tag}" ]; then
            echo "No upstream release tag found."
            echo "has_new_release=false" >> "${GITHUB_OUTPUT}"
            echo "release_tag=" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          recorded_tag=""
          if [ -f "${state_file}" ]; then
            recorded_tag="$(
              python3 - "${state_file}" <<'PY'
import json
import pathlib
import sys

path = pathlib.Path(sys.argv[1])
data = json.loads(path.read_text(encoding="utf-8"))
print(data.get("latest_release_tag", ""))
PY
            )"
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${latest_tag}" >/dev/null 2>&1; then
            echo "Latest upstream release already mirrored to fork: ${latest_tag}"
            echo "has_new_release=false" >> "${GITHUB_OUTPUT}"
            echo "release_tag=${latest_tag}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ "${recorded_tag}" = "${latest_tag}" ]; then
            echo "Latest upstream release already deployed and recorded: ${latest_tag}"
            echo "has_new_release=false" >> "${GITHUB_OUTPUT}"
            echo "release_tag=${latest_tag}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "Found new upstream release: ${latest_tag}"
          echo "has_new_release=true" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${latest_tag}" >> "${GITHUB_OUTPUT}"

      - name: Configure PAT remote for fork mirroring
        if: ${{ steps.detect.outputs.has_new_release == 'true' && steps.pat.outputs.has_sync_pat == 'true' }}
        working-directory: fork
        env:
          SYNC_PAT: ${{ secrets.SYNC_PAT }}
        run: |
          git remote add origin-pat "https://x-access-token:${SYNC_PAT}@github.com/${GITHUB_REPOSITORY}.git" || true
          git remote set-url origin-pat "https://x-access-token:${SYNC_PAT}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Mirror release tag to fork
        if: ${{ steps.detect.outputs.has_new_release == 'true' && steps.pat.outputs.has_sync_pat == 'true' }}
        working-directory: fork
        run: |
          tag="${{ steps.detect.outputs.release_tag }}"
          git fetch upstream "refs/tags/${tag}:refs/tags/${tag}"
          git push origin-pat "refs/tags/${tag}:refs/tags/${tag}"

      - name: Update mirror branch with upstream main
        if: ${{ steps.detect.outputs.has_new_release == 'true' && steps.pat.outputs.has_sync_pat == 'true' }}
        working-directory: fork
        run: |
          git fetch upstream "refs/heads/main:refs/remotes/upstream/main"
          git push origin-pat "refs/remotes/upstream/main:refs/heads/upstream-main"

      - name: Skip fork mirroring without SYNC_PAT
        if: ${{ steps.detect.outputs.has_new_release == 'true' && steps.pat.outputs.has_sync_pat != 'true' }}
        run: |
          echo "SYNC_PAT is not configured. Skipping tag and branch mirroring."
          echo "Deployment will use the upstream release source directly."

      - name: Checkout upstream release source
        if: ${{ steps.detect.outputs.has_new_release == 'true' }}
        uses: actions/checkout@v4
        with:
          repository: router-for-me/CLIProxyAPI
          ref: ${{ steps.detect.outputs.release_tag }}
          path: source

      - name: Authenticate to Google Cloud
        if: ${{ steps.detect.outputs.has_new_release == 'true' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: code-584@gen-lang-client-0984777924.iam.gserviceaccount.com

      - name: Set up gcloud SDK
        if: ${{ steps.detect.outputs.has_new_release == 'true' }}
        uses: google-github-actions/setup-gcloud@v2

      - name: Show active gcloud account
        if: ${{ steps.detect.outputs.has_new_release == 'true' }}
        run: gcloud auth list --filter=status:ACTIVE --format="value(account)"

      - name: Deploy upstream release to Cloud Run
        if: ${{ steps.detect.outputs.has_new_release == 'true' }}
        working-directory: source
        run: |
          gcloud run deploy "${SERVICE}" \
            --project "${PROJECT_ID}" \
            --region "${REGION}" \
            --platform managed \
            --port 8317 \
            --source . \
            --quiet

      - name: Show latest ready revision
        if: ${{ steps.detect.outputs.has_new_release == 'true' }}
        run: |
          gcloud run services describe "${SERVICE}" \
            --project "${PROJECT_ID}" \
            --region "${REGION}" \
            --platform managed \
            --format="value(status.latestReadyRevisionName)"

      - name: Record processed upstream release
        if: ${{ steps.detect.outputs.has_new_release == 'true' }}
        working-directory: fork
        env:
          RELEASE_TAG: ${{ steps.detect.outputs.release_tag }}
        run: |
          python3 - <<'PY'
import json
import os
from datetime import datetime, timezone
from pathlib import Path

path = Path(".github/upstream-release-state.json")
path.parent.mkdir(parents=True, exist_ok=True)
payload = {
    "latest_release_tag": os.environ["RELEASE_TAG"],
    "source_repository": "router-for-me/CLIProxyAPI",
    "updated_at": datetime.now(timezone.utc).isoformat(),
}
path.write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/upstream-release-state.json

          if git diff --cached --quiet; then
            echo "No release state changes to commit."
            exit 0
          fi

          git commit -m "chore: record upstream release ${RELEASE_TAG}"
          git push origin HEAD:main
