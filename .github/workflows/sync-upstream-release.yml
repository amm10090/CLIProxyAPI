name: sync-upstream-release

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  sync:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      has_new_release: ${{ steps.detect.outputs.has_new_release }}
      release_tag: ${{ steps.detect.outputs.release_tag }}
    steps:
      - name: Checkout fork repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch upstream and origin tags
        run: |
          git remote add upstream https://github.com/router-for-me/CLIProxyAPI.git || true
          git fetch upstream --tags --prune
          git fetch origin --tags --prune

      - name: Detect latest upstream release
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          latest_tag="$(
            curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/router-for-me/CLIProxyAPI/releases/latest \
              | python3 -c "import json,sys; print(json.load(sys.stdin).get('tag_name',''))"
          )"

          if [ -z "${latest_tag}" ]; then
            echo "No upstream release tag found."
            echo "has_new_release=false" >> "${GITHUB_OUTPUT}"
            echo "release_tag=" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${latest_tag}" >/dev/null 2>&1; then
            echo "Latest upstream release already synced: ${latest_tag}"
            echo "has_new_release=false" >> "${GITHUB_OUTPUT}"
            echo "release_tag=${latest_tag}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "Found new upstream release: ${latest_tag}"
          echo "has_new_release=true" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${latest_tag}" >> "${GITHUB_OUTPUT}"

      - name: Sync release tag to fork
        if: ${{ steps.detect.outputs.has_new_release == 'true' }}
        run: |
          tag="${{ steps.detect.outputs.release_tag }}"
          git fetch upstream "refs/tags/${tag}:refs/tags/${tag}"
          git push origin "refs/tags/${tag}:refs/tags/${tag}"

      - name: Update mirror branch with upstream main
        if: ${{ steps.detect.outputs.has_new_release == 'true' }}
        run: |
          git fetch upstream "refs/heads/main:refs/remotes/upstream/main"
          git push origin "refs/remotes/upstream/main:refs/heads/upstream-main"

  deploy:
    permissions:
      contents: read
      id-token: write
    needs: sync
    if: ${{ needs.sync.outputs.has_new_release == 'true' }}
    uses: ./.github/workflows/deploy-cloud-run-on-release.yml
    with:
      release_tag: ${{ needs.sync.outputs.release_tag }}
    secrets: inherit
