name: deploy-cloud-run-on-release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to deploy (optional)"
        required: false
        type: string
  workflow_call:
    inputs:
      release_tag:
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: cliproxy-prod-release-deploy
  cancel-in-progress: false

env:
  PROJECT_ID: gen-lang-client-0984777924
  REGION: us-central1
  SERVICE: cliproxy

jobs:
  deploy:
    if: ${{ github.event_name != 'release' || !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag || github.event.release.tag_name || github.ref_name }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy release to Cloud Run
        run: |
          gcloud run deploy "${SERVICE}" \
            --project "${PROJECT_ID}" \
            --region "${REGION}" \
            --platform managed \
            --source . \
            --quiet

      - name: Show latest ready revision
        run: |
          gcloud run services describe "${SERVICE}" \
            --project "${PROJECT_ID}" \
            --region "${REGION}" \
            --platform managed \
            --format="value(status.latestReadyRevisionName)"
